<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./style/style.css" />
    <title>Payooo</title>
  </head>
  <body class="min-h-screen bg-base-200">
    <!-- first page start -->
    <div
      class="first_page min-h-screen w-full flex flex-col items-center justify-center px-4 sm:px-6 md:px-8"
    >
      <div class="w-full max-w-sm sm:max-w-md md:max-w-lg flex flex-col items-center justify-center">
        <figure class="mb-6 sm:mb-7">
          <img
            src="./payoo-resources/assets/Logo-full.png"
            alt="Payooo Logo"
            class="w-40 sm:w-48 md:w-56 lg:w-64 h-auto object-contain"
          />
        </figure>

        <form
          class="fieldset bg-base-100 border-base-300 rounded-2xl w-full border p-5 sm:p-6 md:p-7 shadow-sm"
        >
          <fieldset class="fieldset w-full">
            <label class="label text-black font-bold text-sm sm:text-base">
              Mobile Number
            </label>
            <input
              type="number"
              class="input validator w-full"
              placeholder="1234567890"
              required
              id="phoneNumber"
            />
            <p class="validator-hint hidden">Required</p>
          </fieldset>

          <label class="fieldset w-full mt-2">
            <span class="label text-black font-bold text-sm sm:text-base">
              4 Digit Pin
            </span>
            <input
              type="password"
              class="input validator w-full"
              placeholder="1234"
              required
              id="pinNumber"
            />
            <span class="validator-hint hidden">Required</span>
          </label>

          <button
            id="loginBtn"
            class="btn btn-primary text-white mt-4 rounded-2xl w-full"
            type="submit"
          >
            Login
          </button>
        </form>
      </div>
    </div>
    <!-- first page end -->

    <script src="./js/index.js"></script>
  </body>
</html>
